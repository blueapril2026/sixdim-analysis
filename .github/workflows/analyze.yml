name: 六维场论风控模型全自动分析
on:
  workflow_dispatch:

jobs:
  analysis:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y solc graphviz
          pip install pandas numpy matplotlib seaborn requests gitpython networkx scikit-learn tqdm

      - name: 运行分析
        run: python script.py

      - name: 列出文件
        run: ls -la

      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: sixdim-reports
          path: |
            *.png
            *.csv
