name: 六维场论风控模型全自动分析
on:
  workflow_dispatch:

jobs:
  analysis:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y solc graphviz

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Python 依赖
        run: |
          pip install pandas numpy matplotlib seaborn requests gitpython networkx scikit-learn tqdm

      - name: 运行六维场论分析
        run: python script.py

      - name: 上传报告
        uses: actions/upload-artifact@v4
        with:
          name: sixdim-reports
          path: |
            *.png
            *.csv
